<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twisting orbits</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="draw" class="scene-canvas"></canvas>

    <div class="controls">
      <div class="controls__row">
        <label class="controls__label" for="twistRange">Закручивание: </label>
        <input
          class="controls__range"
          type="range"
          id="twistRange"
          min="0"
          max="21"
          value="0"
          step="any"
        />
        <span class="controls__value" id="twistValue">0</span>
      </div>

      <div class="controls__row">
        <label class="controls__label" for="orbitsCountRange"
          >Количество орбит:
        </label>
        <input
          class="controls__range"
          type="range"
          id="orbitsCountRange"
          min="0"
          max="200"
          value="21"
        />
        <span class="controls__value" id="orbitsCountValue">21</span>
      </div>

      <div class="controls__row">
        <label class="controls__label" for="orbitStrideRange"
          >Шаг орбит:
        </label>
        <input
          class="controls__range"
          type="range"
          id="orbitStrideRange"
          min="1"
          max="50"
          value="1"
        />
        <span class="controls__value" id="orbitStrideValue">1</span>
      </div>

      <div class="controls__row">
        <label class="controls__checkbox-label">
          <input type="checkbox" id="displayOrbits" />
          Отображать орбиты
        </label>
      </div>

      <div class="controls__row controls__row--actions">
        <label class="controls__animate-toggle" for="animateToggle">
          <input type="checkbox" id="animateToggle" />
        </label>

        <button class="controls__button" id="exportButton" type="button">
          Экспорт в SVG
        </button>
      </div>
    </div>

    <button class="controls-toggle" id="controlsToggle" type="button" title="Скрыть панель">☰</button>

    <script src="https://unpkg.com/canvas2svg"></script>

    <script type="module" src="main.ts"></script>
  </body>
</html>
