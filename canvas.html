<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twisting orbits</title>
  </head>
  <body>
    <canvas id="draw" width="1920" height="1080"></canvas>

    <div id="controls">
      <div>
        <label for="pointRange">Сдвиг: </label>
        <input
          type="range"
          id="pointRange"
          min="0"
          max="2"
          value="0"
          step="any"
        />
        <span id="val">30</span>
      </div>
      <div>
        <label for="pointRange2">Количество орбит: </label>
        <input type="range" id="pointRange2" min="0" max="200" value="21" />
        <span id="val2">30</span>
      </div>
      <div>
        <label for="pointRange3">Div: </label>
        <input type="range" id="pointRange3" min="1" max="50" value="1" />
        <span id="val3">30</span>
      </div>
    </div>
  </body>

  <style>
    * {
      margin: unset;
      padding: unset;
    }

    body {
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;

      height: 100dvh;
      width: 100dvw;

      background: #101010;
    }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.8);
      padding: 10px;
      border-radius: 8px;
    }
  </style>

  <script src="script.js"></script>
</html>
